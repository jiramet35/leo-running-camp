<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
  * {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body {
    margin: 0;
    height: 100vh;
    background: #f5f5f7;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    width: 350px;
    text-align: center;
  }

  h2 {
    letter-spacing: 2px;
    color: #3b3b5c;
    margin-bottom: 30px;
  }

  .input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border: none;
    border-radius: 6px;
    background: #e9e9ee;
    font-size: 14px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #666;
    margin-bottom: 20px;
  }

  .row a {
    color: #7a6cf0;
    text-decoration: none;
  }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 6px;
    background: linear-gradient(90deg, #6a6afc, #8b5cf6);
    color: white;
    font-weight: bold;
    letter-spacing: 1px;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn:hover {
    opacity: 0.9;
  }
  .btn-outline {
    width: 100%;
    padding: 14px;
    border-radius: 6px;
    border: 2px solid #8b5cf6;
    background: transparent;
    color: #8b5cf6;
    font-weight: bold;
    margin-top: 10px;
    cursor: pointer;
    transition: 0.2s;
  }

  .btn-outline:hover {
    background: #8b5cf6;
    color: #fff;
  }
  #status {
    margin-top: 15px;
    font-size: 13px;
  }
</style>
</head>

<body>

<div class="container">
  <h2>LOGIN</h2>

  <input type="email" id="email" class="input" placeholder="Username">
  <input type="password" id="password" class="input" placeholder="Password">

  <div class="row">
    <label><input type="checkbox"> Remember me</label>
    <a href="#" onclick="resetPassword()">Forgot?</a>
  </div>

  <button class="btn" onclick="login()">LOGIN</button>
  <button class="btn-outline" onclick="register()">สมัครสมาชิก</button>

  <div id="status"></div>
</div>

// login
window.login = async function() {
  try {
    const res = await signInWithEmailAndPassword(
      auth,
      email.value,
      password.value
    );

    const uid = res.user.uid;

    // 🔥 ดึง role จาก Firestore
    const userDoc = await getDoc(doc(db, "users", uid));

    if (!userDoc.exists()) {
      status.innerText = "ไม่พบข้อมูล user";
      return;
    }

    const roles = userDoc.data().roles || [];

    status.innerText = "เข้าสู่ระบบสำเร็จ";

    // 🔥 แยกหน้า
    if (roles.includes("coach") || roles.includes("staff")) {
      window.location.replace("coach.html");
    } else {
      window.location.replace("athlete-dashboard.html");
    }

  } catch (e) {
    status.innerText = e.message;
  }
};

// reset password
window.resetPassword = function() {
  if (!email.value) {
    status.innerText = "กรุณากรอกอีเมลก่อน";
    return;
  }

  sendPasswordResetEmail(auth, email.value)
    .then(() => status.innerText = "📩 ส่งลิงก์รีเซ็ตรหัสผ่านแล้ว")
    .catch(e => status.innerText = e.message);
}


// auto redirect
onAuthStateChanged(auth, async (user) => {
  if (checked) return;
  checked = true;

  if (user) {
    const userDoc = await getDoc(doc(db, "users", user.uid));
    const roles = userDoc.data()?.roles || [];

    if (roles.includes("coach") || roles.includes("staff")) {
      window.location.replace("coach.html");
    } else {
