<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ส่งผลซ้อม</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f3f4f6;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px; /* 🔥 กันชนขอบจอ */
}

.card {
  width: 100%;
  max-width: 420px;
  background: white;
  padding: 28px 24px; /* 🔥 เพิ่ม padding */
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

h2 {
  text-align: center;
  margin-bottom: 22px;
}

.form-group {
  margin-bottom: 16px;
}

label {
  font-size: 13px;
  color: #6b7280;
  display: block;
  margin-bottom: 6px;
}

input, textarea, select {
  width: 100%;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
  box-sizing: border-box; /* 🔥 แก้ล้นขวา */
}

textarea {
  height: 80px;
  resize: none;
}

.row {
  display: flex;
  gap: 12px;
}

.row .form-group {
  flex: 1;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: linear-gradient(135deg,#7c3aed,#9333ea);
  color: white;
  border: none;
  border-radius: 12px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  opacity: 0.9;
}

/* effort */
.effort-box {
  text-align: center;
  margin-top: 6px;
}

.effort-value {
  font-size: 28px;
  font-weight: bold;
  color: #7c3aed;
  margin-bottom: 6px;
}

input[type=range] {
  width: 100%;
}

.levels {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  justify-content: center;
  margin-top: 10px;
}

.level-btn {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid #ddd;
  background: white;
  cursor: pointer;
}

.level-btn.active {
  background: #7c3aed;
  color: white;
}

#status {
  text-align: center;
  margin-top: 12px;
  font-size: 14px;
}

.checkbox-group label {
  display: flex;
  align-items: center;   /* 🔥 จัดให้อยู่กึ่งกลางแนวตั้ง */
  gap: 8px;
  cursor: pointer;
  font-size: 14px;
}

.checkbox-group input {
  width: 16px;
  height: 16px;
}
</style>
</head>

<body>

<div class="card">
<h2>🏃‍♂️ ส่งผลซ้อม</h2>

<div class="form-group">
<label>วันที่</label>
<input type="date" id="date">
</div>

<div class="form-group">
<label>ประเภทการซ้อม</label>
<select id="type">
<option value="easy">Easy</option>
<option value="interval">Interval</option>
<option value="tempo">Tempo</option>
<option value="longrun">Long Run</option>
</select>
</div>

<div class="form-group checkbox-group">
  <label>
    <input type="checkbox" id="completed">
    <b style="color: red;">คุณวิ่งจบตามโปรแกรม</b>
  </label>
</div>

<div class="row">
<div class="form-group">
<label>ระยะ (km)</label>
<input id="distance" placeholder="10.50">
</div>

<div class="form-group">
<label>เวลา</label>
<input id="time" placeholder="00:45:30">
</div>
</div>

<div class="form-group effort-box">
<label>ระดับความเหนื่อย</label>
<div class="effort-value" id="effortValue">5</div>
<input type="range" id="slider" min="1" max="10" value="5">
<!-- <div class="levels" id="levels"></div> -->
</div>

<div class="form-group">
<label>Garmin / Strava</label>
<input id="link">
</div>

<div class="form-group">
<label>หมายเหตุ</label>
<textarea id="note"></textarea>
</div>

<button onclick="submitRun()">บันทึก</button>
<div id="status"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore,addDoc,collection ,getDoc , doc, setDoc} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
document.addEventListener("DOMContentLoaded", () => {

  const params = new URLSearchParams(window.location.search);
  const dateParam = params.get("date");

  console.log("dateParam:", dateParam);

  if (dateParam) {
    const dateInput = document.getElementById("date");

    if (dateInput) {
      dateInput.value = dateParam;
    } else {
      console.error("ไม่เจอ input#date");
    }
  }

});
const firebaseConfig = {
  apiKey: "AIzaSyDQ73R5g8CQyC76nKW9rPCCTwHm8ZRJaQw",
  authDomain: "leo-running-camp.firebaseapp.com",
  projectId: "leo-running-camp",
  storageBucket: "leo-running-camp.firebasestorage.app",
  messagingSenderId: "145488848267",
  appId: "1:145488848267:web:e8daabea6061c818fb7b8e",
  measurementId: "G-5FCB6D998V"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;

onAuthStateChanged(auth,u=>{
  if(!u) location.href="login.html";
  currentUser=u;
});

// effort
let effort=5;
const val=document.getElementById("effortValue");
const slider=document.getElementById("slider");
const levels=document.getElementById("levels");

for(let i=1;i<=10;i++){
  const b=document.createElement("button");
  b.innerText=i;
  b.className="level-btn";
  b.onclick=()=>setEffort(i);
  levels.appendChild(b);
}

function setEffort(v){
  effort=v;
  val.innerText=v;
  slider.value=v;
  document.querySelectorAll(".level-btn").forEach((b,i)=>{
    b.classList.toggle("active",i+1===v);
  });
}

slider.oninput=e=>setEffort(Number(e.target.value));
setEffort(5);

// submit
window.submitRun = async () => {
  if (!currentUser) return;

  const status = document.getElementById("status");

  const date = document.getElementById("date").value;
  const dist = document.getElementById("distance").value;
  const time = document.getElementById("time").value;

  // ✅ validate
  if (!date) {
    status.innerText = "กรุณาเลือกวันที่";
    return;
  }

  if (!/^\d+(\.\d{1,2})?$/.test(dist)) {
    //status.innerText = "ระยะไม่ถูกต้อง";
    alert("⚠️ ระบุระยะไม่ถูกต้อง");
    return;
  }

  if (!/^([0-1]?[0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]$/.test(time)) {
    //status.innerText = "เวลาไม่ถูกต้อง";
    alert("⚠️ ระบุเวลาไม่ถูกต้อง");
    return;
  }

  try {
    // 🔥 สร้าง id กันซ้ำ
    const docId = currentUser.uid + "_" + date;

    const ref = doc(db, "runs", docId);
    const existing = await getDoc(ref);

    if (existing.exists()) {
      //status.innerText = "⚠️ วันนี้คุณส่งแล้ว";
      alert("⚠️ วันนี้ ("+date+") คุณส่งผลวิ่งแล้ว");
      return;
    }

    // ✅ ใช้ setDoc แทน addDoc
    await setDoc(ref, {
      userId: currentUser.uid,
      date,
      type: document.getElementById("type").value,
      completed: document.getElementById("completed").checked,
      distance: Number(dist),
      time,
      effort,
      link: document.getElementById("link").value,
      note: document.getElementById("note").value,
      created_at: new Date()
    });

    //status.innerText = "สำเร็จ 🎉";
    alert("สำเร็จ 🎉");
  } catch (e) {
    console.error(e);
    status.innerText = e.message;
  }
};
</script>

</body>
</html>
