<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Coach Dashboard</title>
<!-- 📅 FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f6f8;
  padding: 20px;
}

h2 {
  margin-bottom: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  text-align: center;
}

th {
  background: #7c3aed;
  color: white;
}

tr:nth-child(even) {
  background: #f9fafb;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:15px;
}

.athlete-card {
  background:#fff;
  border-radius:16px;
  padding:16px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.athlete-name {
  font-weight:bold;
  font-size:16px;
}

.badge {
  display:inline-block;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  margin-top:5px;
}

.week { background:#e0f2fe; }
.month { background:#fef3c7; }
.race { background:#fee2e2; }

/* calendar colors */
.easy { background:#22c55e !important; }
.interval { background:#ef4444 !important; }
.tempo { background:#f97316 !important; }
.longrun { background:#3b82f6 !important; }
.race-event { background:#facc15 !important; color:black !important; }

button {
  padding:6px 10px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-size:12px;
}

button:hover {
  opacity:0.8;
}

#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#modalContent {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 380px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  animation: fadeIn 0.2s ease;
}

#modalBody {
  margin-top: 10px;
}

#modalBody div {
  padding: 8px 10px;
  margin-bottom: 6px;
  background: #f3f4f6;
  border-radius: 8px;
  font-size: 14px;
}

#modalContent button {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #7c3aed;
  color: white;
  cursor: pointer;
}

@keyframes fadeIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

#athleteModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#athleteModalContent {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;
}

#athleteModalBody div {
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

#athleteModalContent button {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #7c3aed;
  color: white;
}

.athlete-card {
  cursor: pointer;
  transition: 0.2s;
}

.athlete-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h2>🏃‍♂️ Coach Dashboard</h2>

<!-- 
<div class="card">
  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>ชื่อ</th>
        <th>นน.</th>
        <th>สูง</th>
        <th>PB 5K</th>
        <th>PB 10K</th>
        <th>PB 21K</th>
        <th>PB 42K</th>
        <th>สิทธิ์</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
-->

<div class="card">
  <h3>👥 นักกีฬา</h3>
  <div id="athleteGrid" class="grid"></div>
</div>

<div class="card">
  <h3>📅 Calendar รวม</h3>
  <div id="calendar"></div>
</div>

<div id="modal">
  <div id="modalContent">
    <h3 id="modalTitle">👥 นักกีฬา</h3>
    <div id="modalBody"></div>

    <button onclick="closeModal()">ปิด</button>
  </div>
</div>

<div id="athleteModal">
  <div id="athleteModalContent">
    <h3 id="athleteModalTitle"></h3>
    <div id="athleteModalBody"></div>

    <button onclick="closeAthleteModal()">ปิด</button>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  arrayUnion,
  arrayRemove,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDQ73R5g8CQyC76nKW9rPCCTwHm8ZRJaQw",
  authDomain: "leo-running-camp.firebaseapp.com",
  projectId: "leo-running-camp",
  storageBucket: "leo-running-camp.firebasestorage.app",
  messagingSenderId: "145488848267",
  appId: "1:145488848267:web:e8daabea6061c818fb7b8e",
  measurementId: "G-5FCB6D998V"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const tableBody = document.getElementById("tableBody");
const athleteGrid = document.getElementById("athleteGrid");
let usersGlobal = [];

// ⏱️ helper
function timeToSec(t){
  if (!t || t === "-") return 999999;
  const p = t.split(":").map(Number);
  return p.length === 2 ? p[0]*60+p[1] :
         p.length === 3 ? p[0]*3600+p[1]*60+p[2] :
         999999;
}

// 🔥 AUTH
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    location.href="login.html";
    return;
  }

  const userDoc = await getDoc(doc(db,"users",user.uid));
  const roles = userDoc.data()?.roles || [];

  if(!roles.includes("coach") && !roles.includes("staff")){
    alert("ไม่มีสิทธิ์");
    location.href="profile.html";
    return;
  }

  // =========================
  // 🔥 โหลด USERS
  // =========================
  const snapshot = await getDocs(collection(db,"users"));

  let users = [];

  snapshot.forEach(d=>{
    const data = d.data();

    users.push({
      uid: d.id,
      name: `${data.athlete_name || ""} ${data.athlete_last_name || ""}`,
      nickname: data.athlete_nick_name || "-", 
      weight: data.weight || "-",
      height: data.height || "-",
      pb5k: data.pb?.["5k"],
      pb10k: data.pb?.["10k"],
      pb21k: data.pb?.["21k"],
      pb42k: data.pb?.["42k"],
      roles: data.roles || []
    });
  });

  // 🔥 สร้าง map หลังจากมี users แล้ว
  const userMap = {};

  users.forEach(u => {
    userMap[u.uid] = `${u.name} (${u.nickname})`;
  });
  // =========================
  // 🔥 TABLE
  // =========================
  users.sort((a,b)=>timeToSec(a.pb5k)-timeToSec(b.pb5k));
  usersGlobal = users;
  tableBody.innerHTML="";
  users.forEach((u,i)=>{
    tableBody.innerHTML += `
      <tr>
        <td>${i+1}</td>
        <td>${u.name}</td>
        <td>${u.weight}</td>
        <td>${u.height}</td>
        <td>${u.pb5k||"-"}</td>
        <td>${u.pb10k||"-"}</td>
        <td>${u.pb21k||"-"}</td>
        <td>${u.pb42k||"-"}</td>
        <td>
          <button onclick='toggleRole("${u.uid}","coach")'>
            ${(u.roles || []).includes("coach") ? "✅ Coach" : "❌ Coach"}
          </button>

          <button onclick='toggleRole("${u.uid}","staff")'>
            ${(u.roles || []).includes("staff") ? "✅ Staff" : "❌ Staff"}
          </button>

          <button onclick='toggleRole("${u.uid}","athlete")'>
            ${(u.roles || []).includes("athlete") ? "✅ Athlete" : "❌ Athlete"}
          </button>
      </td>
      </tr>
    `;
  });

  // =========================
  // 🔥 DASHBOARD DATA
  // =========================
  let events = [];
  athleteGrid.innerHTML="";

  for(const u of users){

    // 🏃 runs
    const runSnap = await getDocs(
      query(collection(db,"runs"), where("userId","==",u.uid))
    );

    let weekKm=0, monthKm=0;
    const now=new Date();

    runSnap.forEach(r=>{
      const d=r.data();
      const runDate=new Date(d.date);

      const diff=(now-runDate)/(1000*60*60*24);

      if(diff<=7) weekKm+=d.distance||0;
      if(runDate.getMonth()===now.getMonth()) monthKm+=d.distance||0;
    });

    // 🏁 races
    const raceSnap = await getDocs(
      query(collection(db,"races"), where("athleteId","==",u.uid))
    );

    let nextRace="-";

    raceSnap.forEach(r=>{
      
      const d=r.data();

      if(new Date(d.date)>new Date()){
        nextRace = `${d.name} (${d.date})`;
      }

      events.push({
        title:`🏁 ${u.name}`,
        start:d.date,
        classNames:["race-event"]
      });
    });

    // 🎴 CARD
athleteGrid.innerHTML += `
  <div class="athlete-card" onclick='openAthlete("${u.uid}")'>
    <div class="athlete-name">
      ${u.name} (${u.nickname})
    </div>

    <div class="badge week">Week: ${weekKm.toFixed(1)} km</div>
    <div class="badge month">Month: ${monthKm.toFixed(1)} km</div>
    <div class="badge race">🏁 ${nextRace}</div>
  </div>
`;
  }

  // =========================
  // 🔥 PROGRAM → CALENDAR
  // =========================
  const grouped = {};

function addEvent(date, type, name){
  const key = date + "_" + type;

  if(!grouped[key]){
    grouped[key] = {
      date,
      type,
      count: 0,
      names: []
    };
  }

  grouped[key].count++;
  grouped[key].names.push(name);
}

// 🔥 โหลด programs
const programSnap = await getDocs(collection(db,"programs"));

programSnap.forEach(docSnap=>{
  const p = docSnap.data();
  const start = new Date(p.startDate);

  const dayMap = {
    mon: 0,
    tue: 1,
    wed: 2,
    thu: 3,
    fri: 4,
    sat: 5,
    sun: 6
  };

  Object.entries(p.schedule).forEach(([day,val])=>{
    if(!val?.type) return;

    const d = new Date(start);
    d.setDate(start.getDate() + dayMap[day]);

    const dateStr = d.toISOString().split("T")[0];

    // ✅ ใช้ athleteId จาก program
    addEvent(
      dateStr,
      val.type,
      userMap[p.athleteId] || "Unknown"
    );
  });
});

// 🔥 แปลง grouped → events
Object.values(grouped).forEach(e=>{
  events.push({
    title: `${e.type} (${e.count})`,
    start: e.date,
    classNames: [e.type],
    extendedProps: {
      names: e.names
    }
  });
});
  // =========================
  // 📅 CALENDAR
  // =========================
const calendar = new FullCalendar.Calendar(
  document.getElementById("calendar"),
  {
    initialView: "dayGridMonth",
    height: "auto",
    dayMaxEvents: true,

    events: events,

    eventClick: function(info){
    const names = info.event.extendedProps.names || [];

    document.getElementById("modalTitle").innerText =
      "📅 " + info.event.startStr;

    document.getElementById("modalBody").innerHTML =
      names.map(n => `<div>👤 ${n}</div>`).join("");

    document.getElementById("modal").style.display = "flex";
    }
  }
);

calendar.render();
});

// =========================
// 🔥 TOGGLE ROLE
// =========================
window.toggleRole = async function(uid, role) {
  try {
    const userRef = doc(db, "users", uid);

    // 🔥 โหลด roles ล่าสุด
    const snap = await getDoc(userRef);
    const roles = snap.data().roles || [];

    // ❗ กันลบ coach ตัวเอง
    if (uid === auth.currentUser.uid && role === "coach") {
      alert("ห้ามลบสิทธิ์ coach ของตัวเอง");
      return;
    }

    if (roles.includes(role)) {
      await updateDoc(userRef, {
        roles: arrayRemove(role)
      });
      alert("ลบ " + role);
    } else {
      await updateDoc(userRef, {
        roles: arrayUnion(role)
      });
      alert("เพิ่ม " + role);
    }

    location.reload();

  } catch (e) {
    console.error(e);
    alert(e.message);
  }
};


window.closeModal = function(){
  document.getElementById("modal").style.display = "none";
}

//Athlete Modal
window.openAthlete = function(uid){

  const u = usersGlobal.find(x => x.uid === uid);
  if(!u) return;

  document.getElementById("athleteModalTitle").innerText =
    u.name + " (" + u.nickname + ")";

  document.getElementById("athleteModalBody").innerHTML = `
    <div>น้ำหนัก: ${u.weight} kg</div>
    <div>ส่วนสูง: ${u.height} cm</div>
    <div>PB 5K: ${u.pb5k || "-"}</div>
    <div>PB 10K: ${u.pb10k || "-"}</div>
    <div>PB 21K: ${u.pb21k || "-"}</div>
    <div>PB 42K: ${u.pb42k || "-"}</div>
    <div>สิทธิ์: ${(u.roles || []).join(", ")}</div>
  `;

  document.getElementById("athleteModal").style.display = "flex";
};

window.closeAthleteModal = function(){
  document.getElementById("athleteModal").style.display = "none";
};
</script>

</body>
</html>
