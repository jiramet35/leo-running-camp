<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Athlete Dashboard</title>

<!-- 📅 FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#f3f4f6;
  padding:20px;
}

.container {
  max-width:1000px;
  margin:auto;
}

.card {
  background:white;
  border-radius:16px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

/* 👤 profile */
.profile {
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:10px;
}

.profile div {
  flex:1;
  min-width:120px;
}

.label {
  font-size:12px;
  color:#6b7280;
}

.value {
  font-weight:bold;
}

/* 📅 calendar */
#calendar {
  background:white;
  border-radius:16px;
  padding:10px;
}

/* 🔥 event color */
.easy { background:#22c55e !important; border:none !important; }
.interval { background:#ef4444 !important; border:none !important; }
.tempo { background:#f97316 !important; border:none !important; }
.longrun { background:#3b82f6 !important; border:none !important; }
.rest { background:#9ca3af !important; border:none !important; }

#modal {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
}

#modalContent {
  background:white;
  padding:20px;
  border-radius:16px;
  width:90%;
  max-width:400px;
}

#modalContent h3 {
  margin-top:0;
}

#modalContent button {
  margin-top:15px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#7c3aed;
  color:white;
}

.weight-box {
  background:#eef2ff;
  border-left:4px solid #6366f1;
}
</style>
</head>

<body>

<div class="container">

<!-- 👤 PROFILE -->
<div class="card">
  <h3>👤 ข้อมูลนักกีฬา</h3>
  <div class="profile" id="profile"></div>
</div>

<!-- 📅 CALENDAR -->
<div class="card">
  <h3>📅 ปฏิทินการฝึกซ้อม</h3>
  <div id="calendar"></div>
</div>

</div>

<!-- 🔥 MODAL -->
<div id="modal" style="display:none;">
  <div id="modalContent">
    <h3 id="modalTitle"></h3>
    <div id="modalBody"></div>
    <button onclick="closeModal()">ปิด</button>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc,
  collection,
  query,
  where,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQ73R5g8CQyC76nKW9rPCCTwHm8ZRJaQw",
  authDomain: "leo-running-camp.firebaseapp.com",
  projectId: "leo-running-camp",
  storageBucket: "leo-running-camp.firebasestorage.app",
  messagingSenderId: "145488848267",
  appId: "1:145488848267:web:e8daabea6061c818fb7b8e",
  measurementId: "G-5FCB6D998V"
};
const app = initializeApp(firebaseConfig);

const auth = getAuth(app);
const db = getFirestore(app);

const profileEl = document.getElementById("profile");

onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href="login.html";
    return;
  }

  // 👤 โหลด profile
  const userSnap = await getDoc(doc(db,"users",user.uid));
  const u = userSnap.data();

  profileEl.innerHTML = `
    <div><div class="label">ชื่อ</div><div class="value">${u.athlete_name}</div></div>
    <div><div class="label">นามสกุล</div><div class="value">${u.athlete_last_name}</div></div>
    <div><div class="label">ชื่อเล่น</div><div class="value">${u.athlete_nick_name}</div></div>
    <div><div class="label">ส่วนสูง</div><div class="value">${u.height} cm</div></div>
    <div><div class="label">น้ำหนัก</div><div class="value">${u.weight} kg</div></div>
  `;

  // 📅 โหลด programs
  const q = query(
    collection(db,"programs"),
    where("athleteId","==",user.uid)
  );

  const snap = await getDocs(q);

  let events = [];

  snap.forEach(docSnap=>{
    const p = docSnap.data();
    const start = new Date(p.startDate);

    const daysMap = ["sun","mon","tue","wed","thu","fri","sat"];

    Object.entries(p.schedule).forEach(([dayKey,val])=>{

      const dayIndex = daysMap.indexOf(dayKey);
      if(dayIndex === -1) return;

      const d = new Date(start);
      d.setDate(start.getDate() + ((dayIndex+6)%7)); // map mon start

const dateStr = d.toISOString().split("T")[0];

// 🟢 RUN EVENT
if (val.type && val.type !== "rest") {
  events.push({
    title: "🏃 " + val.type,
    start: dateStr,
    classNames: [val.type],

    extendedProps: {
      category: "run",
      type: val.type,
      detail: val.detail,
      note: val.note
    }
  });
}

// ⚪ REST (optional)
if (val.type === "rest") {
  events.push({
    title: "😴 Rest",
    start: dateStr,
    classNames: ["rest"],
    extendedProps: {
      category: "rest"
    }
  });
}

// 🏋️ WEIGHT EVENT
if (val.weight) {
  events.push({
    title: "🏋️ เวท",
    start: dateStr,
    classNames: ["weight"],

    extendedProps: {
      category: "weight",
      detail: val.weight_note || ""
    }
  });
}

    });

  });

  // 📅 render calendar
  /*const calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {
    initialView: "dayGridMonth",
    height: "auto",
    events: events
  });*/

  

  const calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {
      initialView: "dayGridMonth",
      height: "auto",
      events: events,

eventClick: function(info) {
  const e = info.event;
  const cat = e.extendedProps.category;

  let content = "";

  if (cat === "run") {
    content = `
      <p><b>🏃 วิ่ง</b></p>
      <p>ประเภท: ${e.extendedProps.type}</p>
      <p>รายละเอียด: ${e.extendedProps.detail || "-"}</p>
      <p>หมายเหตุ: ${e.extendedProps.note || "-"}</p>

      <button onclick="goSubmit('${e.startStr}')">ส่งผลวิ่ง</button>
    `;
  }

  if (cat === "weight") {
    content = `
      <p><b>🏋️ เวท</b></p>
      <p>${e.extendedProps.detail || "ไม่มีรายละเอียด"}</p>
    `;
  }

  if (cat === "rest") {
    content = `<p>😴 วันพัก</p>`;
  }

  document.getElementById("modalTitle").innerText = "📅 " + e.startStr;
  document.getElementById("modalBody").innerHTML = content;
  document.getElementById("modal").style.display = "flex";
}
    });

    calendar.render();
});

// close modal
window.closeModal = function() {
  document.getElementById("modal").style.display = "none";
};

//submit activities
window.goSubmit = function(date) {
  // date = 2026-04-29
  window.location.href = "runs-activities.html?date=" + date;
};
</script>

</body>
</html>
