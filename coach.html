<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Coach Dashboard</title>
<!-- 📅 FullCalendar -->
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #f5f6f8;
  padding: 20px;
}

h2 {
  margin-bottom: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 16px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.05);
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 12px;
  text-align: center;
}

th {
  background: #7c3aed;
  color: white;
}

tr:nth-child(even) {
  background: #f9fafb;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(260px,1fr));
  gap:15px;
}

.athlete-card {
  background:#fff;
  border-radius:16px;
  padding:16px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.athlete-name {
  font-weight:bold;
  font-size:16px;
}

.badge {
  display:inline-block;
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  margin-top:5px;
}

.week { background:#e0f2fe; }
.month { background:#fef3c7; }
.race { background:#fee2e2; }

/* calendar colors */
.easy { background:#22c55e !important; }
.interval { background:#ef4444 !important; }
.tempo { background:#f97316 !important; }
.longrun { background:#3b82f6 !important; }
.race-event { background:#facc15 !important; color:black !important; }
.fc .race-event .fc-event-main {
  color: black !important;
}

.fc .race-event .fc-event-title {
  color: black !important;
}

/* เอากรอบฟ้าออก */
.fc .fc-event {
  font-weight: bold;
  border: none !important;
  box-shadow: none !important;
}

/* เอา focus outline (ตอนคลิก) */
.fc .fc-event:focus,
.fc .fc-event:active {
  outline: none !important;
  box-shadow: none !important;
}

/* กัน anchor (ลิงก์ใน event) มีเส้น */
.fc a {
  outline: none !important;
}
button {
  padding:6px 10px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-size:12px;
}

button:hover {
  opacity:0.8;
}

#modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#modalContent {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 380px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  animation: fadeIn 0.2s ease;
}

#modalBody {
  margin-top: 10px;
}

#modalBody div {
  padding: 8px 10px;
  margin-bottom: 6px;
  background: #f3f4f6;
  border-radius: 8px;
  font-size: 14px;
}

#modalContent button {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #7c3aed;
  color: white;
  cursor: pointer;
}

@keyframes fadeIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

#athleteModal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

#athleteModalContent {
  background: white;
  padding: 20px;
  border-radius: 16px;
  width: 90%;
  max-width: 400px;
}

#athleteModalBody div {
  padding: 8px 0;
  border-bottom: 1px solid #eee;
}

#athleteModalContent button {
  margin-top: 15px;
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #7c3aed;
  color: white;
}

.athlete-card {
  cursor: pointer;
  transition: 0.2s;
}

.athlete-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

.role-box {
  margin-top:10px;
  display:flex;
  gap:6px;
}

.role-btn {
  flex:1;
  padding:6px;
  border:none;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  background:#e5e7eb;
}

/* active base */
.role-btn.active {
  color:white;
}

/* แยกสี */
.role-btn.coach.active {
  background:#7c3aed;
}

.role-btn.staff.active {
  background:#0ea5e9;
}

.role-btn.athlete.active {
  background:#22c55e;
}


.role-btn {
  transition: all 0.2s ease;
  transform: scale(1);
}

.role-btn:active {
  transform: scale(0.9);
}

/* เด้งตอน toggle */
.role-btn.animate {
  animation: pop 0.25s ease;
}

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

.btn-create {
  background:#22c55e;
  color:white;
  padding:10px 16px;
  border-radius:10px;
  text-decoration:none;
  font-size:14px;
  font-weight:500;
  transition:0.2s;
}

.btn-create:hover {
  background:#16a34a;
  transform:translateY(-1px);
}

.role-btn.locked {
  background: #ef4444 !important;
  color: white;
}

/* wrapper (optional) */
.filter-box {
  margin: 15px 0;
}

/* dropdown */
#athleteFilter {
  width: 260px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  background: white;
  font-size: 14px;
  font-weight: 500;
  color: #374151;

  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
  cursor: pointer;
  transition: all 0.2s ease;

  appearance: none; /* 🔥 ซ่อน default arrow */
  -webkit-appearance: none;
  -moz-appearance: none;

  /* custom arrow */
  background-image: url("data:image/svg+xml;utf8,<svg fill='%237c3aed' height='20' viewBox='0 0 20 20' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M5 7l5 5 5-5'/></svg>");
  background-repeat: no-repeat;
  background-position: right 10px center;
  background-size: 18px;
}

/* hover */
#athleteFilter:hover {
  border-color: #7c3aed;
}

/* focus */
#athleteFilter:focus {
  outline: none;
  border-color: #7c3aed;
  box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
}

/* dropdown option */
#athleteFilter option {
  padding: 10px;
}

.top-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap; /* 📱 responsive */
}

/* ฝั่งซ้าย */
.top-bar .left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.top-bar label {
  font-size: 13px;
  color: #6b7280;
}

/* ฝั่งขวา */
.top-bar .right {
  display: flex;
  gap: 10px;
}

/* ปุ่ม */
.btn-create {
  background:#22c55e;
  color:white;
  padding:8px 14px;
  border-radius:10px;
  text-decoration:none;
  font-size:13px;
  font-weight:500;
  transition:0.2s;
}

.btn-create:hover {
  background:#16a34a;
  transform:translateY(-1px);
}

hr {
  border: none;
  height: 2px;
  background: linear-gradient(
    to right,
    transparent,
    #e4e4e4,
    transparent
  );
  margin: 10px 0;
}

/* logout button */
.btn-logout {
  background:#ef4444;
  color:white;
  border:none;
  padding:6px 12px;
  border-radius:8px;
  font-size:12px;
  cursor:pointer;
  transition:0.2s;
}

/* hover */
.btn-logout:hover {
  background:#dc2626;
  transform:translateY(-1px);
}

/* click */
.btn-logout:active {
  transform:scale(0.95);
}
</style>
</head>

<body>

<h2>🏃‍♂️ Coach Dashboard</h2>
<!--

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>ชื่อ</th>
        <th>นน.</th>
        <th>สูง</th>
        <th>PB 5K</th>
        <th>PB 10K</th>
        <th>PB 21K</th>
        <th>PB 42K</th>
        <th>สิทธิ์</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<div class="card">
  <h3>👥 นักกีฬา</h3>
  <div id="athleteGrid" class="grid"></div>
</div>
<hr>
<div class="top-bar">

  <div class="left">
    <label><b style="color: #7c3aed;font-size:larger;">Filter นักกีฬา</b></label>
    <select id="athleteFilter">
      <option value="all">ทั้งหมด</option>
    </select>
  </div>

  <div class="right">
    <a href="assign-trainning.html" class="btn-create">➕ สร้างโปรแกรม</a>
    <a href="athlete-dashboard.html" class="btn-create">My Profile</a>
    <button class="btn-logout" onclick="signOutUser()">Sign Out</button>
  </div>

</div>

<hr>
<div class="card">
  <h3>📅 Calendar รวม</h3>
  <div id="calendar"></div>
</div>

<div id="modal">
  <div id="modalContent">
    <h3 id="modalTitle">👥 นักกีฬา</h3>
    <div id="modalBody"></div>

    <button onclick="closeModal()">ปิด</button>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth,signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
  arrayUnion,
  arrayRemove,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyDQ73R5g8CQyC76nKW9rPCCTwHm8ZRJaQw",
  authDomain: "leo-running-camp.firebaseapp.com",
  projectId: "leo-running-camp",
  storageBucket: "leo-running-camp.firebasestorage.app",
  messagingSenderId: "145488848267",
  appId: "1:145488848267:web:e8daabea6061c818fb7b8e",
  measurementId: "G-5FCB6D998V"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const athleteGrid = document.getElementById("athleteGrid");

let usersGlobal = [];

// =========================
// 🔥 AUTH
// =========================
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    location.href="login.html";
    return;
  }

  const userDoc = await getDoc(doc(db,"users",user.uid));
  const roles = userDoc.data()?.roles || [];

  if(!roles.includes("coach") && !roles.includes("staff")){
    location.href="athlete-dashboard.html";
    return;
  }

  // =========================
  // 🔥 LOAD USERS
  // =========================
  const snapshot = await getDocs(collection(db,"users"));

  let users = [];

  snapshot.forEach(d=>{
    const data = d.data();

    users.push({
      uid: d.id,
      name: `${data.athlete_name || ""} ${data.athlete_last_name || ""}`,
      nickname: data.athlete_nick_name || "-", 
      weight: data.weight || "-",
      height: data.height || "-",
      pb5k: data.pb?.["5k"],
      pb10k: data.pb?.["10k"],
      pb21k: data.pb?.["21k"],
      pb42k: data.pb?.["42k"],
      roles: data.roles || []
    });
  });

  usersGlobal = users;

  // 🔥 map
  const userMap = {};
  users.forEach(u => {
    userMap[u.uid] = `${u.name} (${u.nickname})`;
  });

  const filter = document.getElementById("athleteFilter");
  filter.addEventListener("change", ()=>{
    const val = filter.value;

    const filtered = val === "all"
      ? events
      : events.filter(e => e.extendedProps.athleteId === val);

    calendar.removeAllEvents();
    calendar.addEventSource(filtered);
  });
  //==============
  // add item to dropdown users
  //=============
  users.forEach(u=>{
    filter.innerHTML += `
      <option value="${u.uid}">
        ${u.name} (${u.nickname})
      </option>
    `;
  });
  // =========================
  // 🔥 DASHBOARD
  // =========================
  let events = [];

  athleteGrid.innerHTML="";

  for(const u of users){

    // 🏃 runs
    const runSnap = await getDocs(
      query(collection(db,"runs"), where("userId","==",u.uid))
    );

    let weekKm=0, monthKm=0;
    const now=new Date();

    runSnap.forEach(r=>{
      const d=r.data();
      const runDate=new Date(d.date);

      const diff=(now-runDate)/(1000*60*60*24);

      if(diff<=7) weekKm+=d.distance||0;
      if(runDate.getMonth()===now.getMonth()) monthKm+=d.distance||0;
    });

    // 🏁 races
    const raceSnap = await getDocs(
      query(collection(db,"races"), where("athleteId","==",u.uid))
    );

    let nextRace="-";

    raceSnap.forEach(r=>{
      const d=r.data();

      if(new Date(d.date)>new Date()){
        nextRace = `${d.name} (${d.date})`;
      }

      events.push({
        title: `🏁 ${u.nickname} • ${d.name}`,
        start: d.date,
        
        classNames: ["race-event"],

        extendedProps: {
          type: "race",
          athleteId: u.uid, // ⭐ เพิ่ม
          athleteName: u.name,
          nickname: u.nickname,
          raceName: d.name,
          distance: d.distance || "-",
          note: d.note || "-"
        }
      });
    });

    // 🎴 CARD
    athleteGrid.innerHTML += `
      <div class="athlete-card" onclick='goProfile("${u.uid}")'>
        
        <div class="athlete-name">
          ${u.name} (${u.nickname})
        </div>

        <div class="badge week">Week: ${weekKm.toFixed(1)} km</div>
        <div class="badge month">Month: ${monthKm.toFixed(1)} km</div>
        <div class="badge race">🏁 ${nextRace}</div>

        <div class="role-box" onclick="event.stopPropagation()">
          
          <button 
            class="role-btn ${u.roles.includes("coach") ? "active coach" : ""}"
            onclick='toggleRole("${u.uid}","coach", this)'>
            Coach
          </button>

          <button 
            class="role-btn ${u.roles.includes("staff") ? "active staff" : ""}"
            onclick='toggleRole("${u.uid}","staff", this)'>
            Staff
          </button>

          <button 
            class="role-btn ${u.roles.includes("athlete") ? "active athlete" : ""}"
            onclick='toggleRole("${u.uid}","athlete", this)'>
            Athlete
          </button>

        </div>
      </div>
    `;
  }

  // =========================
  // 🔥 PROGRAM → CALENDAR
  // =========================

  // 🔥 โหลด programs
  const programSnap = await getDocs(collection(db,"programs"));

  programSnap.forEach(docSnap=>{
    const p = docSnap.data();
    const start = new Date(p.startDate);

    const dayMap = {
      mon: 0,
      tue: 1,
      wed: 2,
      thu: 3,
      fri: 4,
      sat: 5,
      sun: 6
    };

    Object.entries(p.schedule || {}).forEach(([day,val])=>{
      console.log(val);
      
      if(!val?.type) return;

      const d = new Date(start);
      d.setDate(start.getDate() + dayMap[day]);

      const dateStr = d.toISOString().split("T")[0];

      const u = users.find(x => x.uid === p.athleteId);

      events.push({
        title: `${u?.nickname || "-"} [ ${val.type} ${val?.detail} ${val?.note} ]`,
        start: dateStr,
        classNames: [val.type],

        extendedProps: {
          type: "training",
          trainingTitle : u?.name,
          athleteId: p.athleteId, // ⭐ สำคัญ (ใช้ filter)
          athleteName: u?.name,
          nickname: u?.nickname,
          detail: val.detail || "-",
          note: val.note || "-"
        }
      });
    });
  });

  //==========================
  //
  //==========================
  

  // =========================
  // 📅 CALENDAR
  // =========================
  const calendar = new FullCalendar.Calendar(
    document.getElementById("calendar"),
    {
      initialView: "dayGridMonth",
      height: "auto",
      dayMaxEvents: true,
      events: events,

      eventClick: function(info){
        const e = info.event;

        document.getElementById("modalTitle").innerText =
          "📅 " + e.startStr;

        if(e.extendedProps.type === "race"){
          document.getElementById("modalBody").innerHTML = `
            <div>🏁 ${e.extendedProps.raceName}</div>
            <div>👤 ${e.extendedProps.nickname}</div>
            <div>📏 ${e.extendedProps.distance} km</div>
            <div>📝 ${e.extendedProps.note}</div>
          `;
        } else {
          document.getElementById("modalBody").innerHTML = `
            <div>🏃 ${e.title}</div>
            <div>👤 ${e.extendedProps.nickname}</div>
            <div>📋 ${e.extendedProps.detail}</div>
            <div>📝 ${e.extendedProps.note}</div>
          `;
        }

        document.getElementById("modal").style.display = "flex";
      }
    }
  );

  calendar.render();
});

// =========================
// 🔥 ROLE
// =========================
window.toggleRole = async function(uid, role, btn){
  try {
    const userRef = doc(db, "users", uid);
    const snap = await getDoc(userRef);
    const roles = snap.data().roles || [];

    // ❗ กันลบ coach ตัวเอง
    if (uid === auth.currentUser.uid && role === "coach") {
      showLock(btn);
      return;
    }

    btn.disabled = true;
    const original = btn.innerHTML;
    btn.innerHTML = "⏳";

    let isAdd = !roles.includes(role);

    if (isAdd) {
      await updateDoc(userRef, {
        roles: arrayUnion(role)
      });
      btn.classList.add("active", role);
    } else {
      await updateDoc(userRef, {
        roles: arrayRemove(role)
      });
      btn.classList.remove("active", role);
    }

    btn.innerHTML = original;
    btn.disabled = false;

    animateBtn(btn);

  } catch (e) {
    console.error(e);
    btn.disabled = false;
  }
};

function animateBtn(btn){
  btn.classList.add("animate");
  setTimeout(()=>{
    btn.classList.remove("animate");
  }, 250);
}

function showLock(btn){
  if(!btn) return;

  const original = btn.innerHTML;

  btn.classList.add("locked");
  btn.innerHTML = "🔒";

  setTimeout(()=>{
    btn.innerHTML = original;
    btn.classList.remove("locked");
    alert("ไม่สามารถลบสิทธิ์ coach ตัวเองได้");
  }, 1000);
}
// =========================
// 🔥 UI
// =========================
window.closeModal = function(){
  document.getElementById("modal").style.display = "none";
};

window.goProfile = function(uid){
  window.location.href = "athlete-profile.html?uid=" + uid;
};

//Sign-out
window.signOutUser = async function(){
  try {
    await signOut(auth);

    // clear session (กัน redirect bug)
    sessionStorage.clear();

    window.location.replace("index.html");
  } catch (e) {
    alert("Logout ไม่สำเร็จ");
  }
};
</script>

</body>
</html>
