<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Athlete Profile</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f3f4f6;
  padding:20px;
}

.container {
  max-width:800px;
  margin:auto;
}

.card {
  background:white;
  padding:20px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  margin-bottom:20px;
}

h2 {
  margin:0 0 10px 0;
}

.info div {
  margin-bottom:5px;
}

canvas {
  margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<div class="card">
  <h2 id="name"></h2>
  <div class="info" id="info"></div>
</div>

<div class="card">
  <h3>📈 Mileage (30 วันล่าสุด)</h3>
  <canvas id="chart"></canvas>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQ73R5g8CQyC76nKW9rPCCTwHm8ZRJaQw",
  authDomain: "leo-running-camp.firebaseapp.com",
  projectId: "leo-running-camp",
  storageBucket: "leo-running-camp.firebasestorage.app",
  messagingSenderId: "145488848267",
  appId: "1:145488848267:web:e8daabea6061c818fb7b8e",
  measurementId: "G-5FCB6D998V"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// 🔥 get uid from URL
const params = new URLSearchParams(window.location.search);
const uid = params.get("uid");

if(!uid){
  alert("ไม่พบ athlete");
}

// ==========================
// 👤 โหลดข้อมูลนักกีฬา
// ==========================
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href = "login.html";
    return;
  }

  // 🔥 get uid from URL
  const params = new URLSearchParams(window.location.search);
  const uid = params.get("uid");

  if(!uid){
    alert("ไม่พบ athlete");
    return;
  }

  // ==========================
  // 👤 โหลดข้อมูลนักกีฬา
  // ==========================
  const userSnap = await getDoc(doc(db,"users",uid));
  const u = userSnap.data();

  document.getElementById("name").innerText =
    `${u.athlete_name} ${u.athlete_last_name} (${u.athlete_nick_name})`;

  document.getElementById("info").innerHTML = `
    <div>น้ำหนัก: ${u.weight} kg</div>
    <div>ส่วนสูง: ${u.height} cm</div>
    <div>PB 5K: ${u.pb?.["5k"] || "-"}</div>
    <div>PB 10K: ${u.pb?.["10k"] || "-"}</div>
    <div>PB 21K: ${u.pb?.["21k"] || "-"}</div>
    <div>PB 42K: ${u.pb?.["42k"] || "-"}</div>
  `;

  // ==========================
  // 📊 โหลด run data
  // ==========================
  const runSnap = await getDocs(
    query(collection(db,"runs"), where("userId","==",uid))
  );

  const days = {};
  const now = new Date();

  for(let i=29;i>=0;i--){
    const d = new Date();
    d.setDate(now.getDate() - i);
    const key = d.toISOString().split("T")[0];
    days[key] = 0;
  }

  runSnap.forEach(r=>{
    const d = r.data();
    if(days[d.date] !== undefined){
      days[d.date] += d.distance || 0;
    }
  });

  const labels = Object.keys(days);
  const data = Object.values(days);

  new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "km",
        data: data,
        tension: 0.3
      }]
    }
  });

});
</script>

</body>
</html>
