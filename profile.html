<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Home</title>
</head>

<body>
  <h1>ยินดีต้อนรับ</h1>
  <p id="user"></p>

  <button onclick="logout()">ออกจากระบบ</button>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getAuth, 
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
window.location.href = "index.html";
const firebaseConfig = {
  apiKey: "AIzaSyDQ73R5g8CQyC76nKW9rPCCTwHm8ZRJaQw",
  authDomain: "leo-running-camp.firebaseapp.com",
  projectId: "leo-running-camp",
  storageBucket: "leo-running-camp.firebasestorage.app",
  messagingSenderId: "145488848267",
  appId: "1:145488848267:web:e8daabea6061c818fb7b8e",
  measurementId: "G-5FCB6D998V"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const userText = document.getElementById("user");

// 🔐 กันหน้า
onAuthStateChanged(auth, (user) => {
  if (user) {
    userText.innerText = "คุณคือ: " + user.email;
    
  } else {
    window.location.href = "index.html"; // ❌ ไม่ได้ login → เด้งกลับ
  }
});

// logout
window.logout = function() {
  signOut(auth).then(() => {
    window.location.href = "index.html";
  });
}
</script>

</body>
</html>
