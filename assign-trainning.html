<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assign Program</title>

<!-- 🔥 Flatpickr -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#f3f4f6;
  padding:20px;
}

.container {
  max-width:900px;
  margin:auto;
}

.card {
  background:white;
  padding:24px;
  border-radius:16px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

h2 {
  text-align:center;
  margin-bottom:20px;
}

input, select, textarea {
  width:100%;
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
  gap:12px;
  margin-top:15px;
}

.day-card {
  padding:12px;
  border-radius:12px;
  border:1px solid #eee;
  background:#fafafa;
}

.day-title {
  font-weight:bold;
  margin-bottom:8px;
}

/* 🔥 dropdown color */
.type-easy { background:#ecfdf5; border-color:#22c55e; }
.type-interval { background:#fef2f2; border-color:#ef4444; }
.type-tempo { background:#fff7ed; border-color:#f97316; }
.type-longrun { background:#eff6ff; border-color:#3b82f6; }
.type-rest { background:#f3f4f6; border-color:#9ca3af; }

button {
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#7c3aed;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

#status {
  text-align:center;
  margin-top:10px;
}

.checkbox-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  font-size: 14px;
  user-select: none;
}

/* ซ่อน checkbox จริง */
.checkbox-wrap input {
  display: none;
}

/* กล่อง */
.checkmark {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid #cbd5e1;
  display: inline-block;
  position: relative;
  transition: 0.2s;
  background: white;
}

/* hover */
.checkbox-wrap:hover .checkmark {
  border-color: #7c3aed;
}

/* ตอนติ๊ก */
.checkbox-wrap input:checked + .checkmark {
  background: linear-gradient(135deg, #7c3aed, #9333ea);
  border-color: transparent;
}

/* ✔ icon */
.checkmark::after {
  content: "";
  position: absolute;
  left: 6px;
  top: 2px;
  width: 6px;
  height: 12px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg) scale(0);
  transition: 0.2s;
}

/* show ✔ */
.checkbox-wrap input:checked + .checkmark::after {
  transform: rotate(45deg) scale(1);
}

/* text */
.label-text {
  color: #374151;
}
</style>
</head>

<body>

<div class="container">
<div class="card">

<h2>📅 Assign Training</h2>

<!-- 👤 athlete -->
<select id="athleteSelect">
  <option value="">เลือกนักกีฬา</option>
</select>

<!-- 📅 range -->
<input type="text" id="dateRange" placeholder="เลือกช่วงวันที่">

<!-- 🔥 grid -->
<div class="grid" id="grid"></div>

<button onclick="saveProgram()">บันทึก</button>
<div id="status"></div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore,
  collection,
  getDocs,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQ73R5g8CQyC76nKW9rPCCTwHm8ZRJaQw",
  authDomain: "leo-running-camp.firebaseapp.com",
  projectId: "leo-running-camp",
  storageBucket: "leo-running-camp.firebasestorage.app",
  messagingSenderId: "145488848267",
  appId: "1:145488848267:web:e8daabea6061c818fb7b8e",
  measurementId: "G-5FCB6D998V"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const grid = document.getElementById("grid");
const status = document.getElementById("status");

let currentUser = null;

// 🔥 days
const days = ["mon","tue","wed","thu","fri","sat","sun"];

// 🔥 render
days.forEach(d=>{
  grid.innerHTML += `
    <div class="day-card" id="card_${d}">
      <div class="day-title">${d.toUpperCase()}</div>

      <select id="${d}_type" onchange="setColor('${d}')">
        <option value="easy">Easy</option>
        <option value="interval">Interval</option>
        <option value="tempo">Tempo</option>
        <option value="longrun">Long Run</option>
        <option value="rest">Rest</option>
      </select>

      <!-- detail -->
      <input id="${d}_detail" placeholder="เช่น 5x1k / 8k jog">

      <!-- weight training -->
        <label class="checkbox-wrap">
            <input type="checkbox" id="${d}_weight_training">
            <span class="checkmark"></span>
            <span class="label-text">เวท (Weight Training)</span>
        </label>

      <!-- weight note -->
        <textarea id="${d}_weight_training_note" placeholder="รายละเอียดเวท"></textarea>

      <!-- normal note -->
      <textarea id="${d}_note" placeholder="note"></textarea>
    </div>
  `;
});

// 🎨 set color
window.setColor = function(day){
  const type = document.getElementById(day+"_type").value;
  const card = document.getElementById("card_"+day);

  card.className = "day-card type-"+type;
}

// 📅 flatpickr range
flatpickr("#dateRange", {
  mode: "range",
  dateFormat: "d-m-Y",
  locale: { firstDayOfWeek: 1 }
});

// 🔥 load athletes
async function loadAthletes(){
  const snap = await getDocs(collection(db,"users"));
  const select = document.getElementById("athleteSelect");

  snap.forEach(docSnap=>{
    const d = docSnap.data();
    if(d.roles?.includes("athlete")){
      const opt = document.createElement("option");
      opt.value = docSnap.id;
      opt.textContent = d.athlete_name + " " + d.athlete_last_name;
      select.appendChild(opt);
    }
  });
}

// 🔐 auth
onAuthStateChanged(auth, async(user)=>{
  if(!user){
    location.href="login.html";
    return;
  }
  currentUser = user;
  await loadAthletes();
});

// 🔄 parse range → ISO
function parseRange(range){
  const [start,end] = range.split(" to ");
  const toISO = d=>{
    const [day,mon,year] = d.split("-");
    return `${year}-${mon}-${day}`;
  };
  return {
    startDate: toISO(start),
    endDate: toISO(end)
  };
}

// 💾 save
window.saveProgram = async()=>{
  if(!currentUser) return;

  const athleteId = athleteSelect.value;
  const range = dateRange.value;

  if(!athleteId || !range){
    status.innerText="กรอกให้ครบ";
    return;
  }

  const {startDate,endDate} = parseRange(range);

  let schedule={};

  days.forEach(d=>{
    schedule[d]={
        type:document.getElementById(d+"_type").value,
        detail:document.getElementById(d+"_detail").value,
        note:document.getElementById(d+"_note").value,
        weight: document.getElementById(d+"_weight_training").checked,
        weight_note: document.getElementById(d+"_weight_training_note").value,
    };
  });

  try{
    await setDoc(doc(db,"programs", athleteId+"_"+startDate),{
      coachId: currentUser.uid,
      athleteId,
      startDate,
      endDate,
      schedule,
      created_at:new Date()
    });

    //status.innerText="บันทึกสำเร็จ 🎉";
    
    setTimeout(() => {
        alert("บันทึกสำเร็จ 🎉");
        location.reload();
    }, 2000);
  }catch(e){
    console.error(e);
    status.innerText=e.message;
  }
}
</script>

</body>
</html>
